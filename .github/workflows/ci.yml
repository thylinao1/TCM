name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (frontend typecheck + bundle)
        run: npm run build

      - name: Typecheck serverless + eval code
        run: npm run typecheck:server

      - name: Unit tests
        run: npm test
